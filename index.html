<!doctype html>

<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Spring Contest 2026</title>

<style>
body {
  margin:0;
  font-family:Gotham, Arial, sans-serif;
  background:#f3f4f6;
}

/* CARD */
.card {
  max-width:420px;
  margin:30px auto;
  border-radius:16px;
  overflow:hidden;
  background:#fff;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

/* TOP */
.top {
  background:#1e2447;
  color:white;
  text-align:center;
  padding:28px 20px;
}
.top h1 {
  margin:0;
  font-size:26px;
}
.top p {
  margin:6px 0;
  font-size:14px;
  opacity:0.9;
}
.divider {
  border-top:1px solid rgba(255,255,255,0.3);
  margin:16px auto;
  max-width:200px;
}
.level-now {
  font-size:20px;
  font-weight:700;
}

/* BOTTOM */
.bottom {
  text-align:center;
  padding:30px 20px;
}

/* CIRCLE */
.circle {
  width:210px;
  height:210px;
  border-radius:50%;
  border:6px solid #f4b400;
  background:#fff;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  margin:0 auto 20px;
}
.circle .small {
  font-size:14px;
  color:#666;
}
.circle .points {
  font-size:34px;
  font-weight:800;
  margin:6px 0;
}
.circle .reward {
  font-size:20px;
  font-weight:700;
}

/* STATS */
.stats {
  display:flex;
  justify-content:space-between;
  max-width:260px;
  margin:0 auto 10px;
  font-weight:700;
}
.stats div {
  width:33%;
}

/* BADGE */
.badge {
  display:inline-block;
  background:#111;
  color:#fff;
  padding:8px 22px;
  border-radius:20px;
  font-size:14px;
  margin:10px 0 20px;
}

/* PROGRESS */
.progress-wrap {
  max-width:300px;
  margin:0 auto;
}

.progress-text {
  display:flex;
  justify-content:space-between;
  font-size:13px;
  color:#666;
  margin-bottom:6px;
}

.progress-bar {
  height:14px;
  background:#ddd;
  border-radius:10px;
  overflow:hidden;
}

.progress-fill {
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#ff6f61,#fcb045);
  border-radius:10px;
}

/* EMAIL */
.email-display {
  margin-top:16px;
  font-size:13px;
  color:#666;
}
</style>

</head>

<body>

<div id="widget" style="display:none">

  <div class="card">

```
<div class="top">
  <h1>Spring Contest</h1>
  <p>24 Mar to 24 Jun (23:59 GMT)</p>
  <div class="divider"></div>
  <div class="level-now" id="currentLevel">YOU'RE ON LEVEL 0!</div>
</div>

<div class="bottom">

  <div class="circle" id="rewardCircle"></div>

  <div class="stats">
    <div id="units">Units</div>
    <div id="points">Points</div>
    <div id="rank">#0</div>
  </div>

  <div class="badge" id="nextBanner">LEVEL 1: 1,000 POINTS</div>

  <div class="progress-wrap">
    <div class="progress-text">
      <span id="progressText">0 / 1000</span>
      <span id="progressPercent">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill"></div>
    </div>
  </div>

  <div class="email-display" id="emailDisplay"></div>

</div>
```

  </div>
</div>

<script>

const apiUrl = "https://script.google.com/macros/s/AKfycbwQnBwgravJEERSGbZk1-YajdXWotR6xB58yV3UgEB6Bedeftp2WEeF39Q2uicsCfc/exec";

const milestones = [
  {points:1000, reward:"$200"},
  {points:2000, reward:"$500"},
  {points:5000, reward:"$1,500"},
  {points:10000, reward:"$3,500"},
  {points:25000, reward:"$10,000"},
  {points:50000, reward:"$25,000"},
  {points:150000, reward:"$100,000"}
];

// 🔥 AUTO LOAD luôn (không cần nhập ID)
loadData("test"); // 👈 đổi nếu cần

async function loadData(userId) {
  try {
    const res = await fetch(apiUrl + "?id=" + encodeURIComponent(userId));
    const data = await res.json();

    render(data.points, data.rank, data.email || data.userId);

  } catch (err) {
    alert("API lỗi");
    console.error(err);
  }
}

function render(points,userRank,email){

  document.getElementById("widget").style.display="block";

  let currentLevel=0, next=null;

  milestones.forEach((m,i)=>{
    if(points>=m.points){ currentLevel=i+1; }
    else if(!next){ next=m; }
  });

  if(!next) next=milestones[milestones.length-1];

  document.getElementById("currentLevel").textContent =
    `YOU'RE ON LEVEL ${currentLevel}!`;

  document.getElementById("rewardCircle").innerHTML = `
    <div class="small">Unlock Next Level</div>
    <div class="points">${next.points.toLocaleString()}</div>
    <div class="reward">${next.reward}</div>
  `;

  document.getElementById("units").textContent = "Units";
  document.getElementById("points").textContent = points;
  document.getElementById("rank").textContent = `#${userRank}`;

  document.getElementById("nextBanner").textContent =
    `LEVEL ${currentLevel+1}: ${next.points.toLocaleString()} POINTS`;

  const percent = Math.min(100, (points/next.points)*100).toFixed(0);

  document.getElementById("progressText").textContent =
    `${points.toLocaleString()} / ${next.points.toLocaleString()}`;

  document.getElementById("progressPercent").textContent =
    percent + "%";

  document.getElementById("progressFill").style.width =
    percent + "%";

  document.getElementById("emailDisplay").textContent =
    `Email: ${email}`;
}

</script>

</body>
</html>
