<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Spring Contest 2026</title>

<style>
body {margin:0; font-family:Gotham, Arial, sans-serif; background:#fff;}

.top {background:#1e2447; color:white; text-align:center; padding:30px 20px;}
.top h1 {margin:0; font-size:26px;}
.top p {margin:4px 0; font-size:14px; opacity:0.9;}

.divider {border-top:1px solid #ccc; margin:16px auto; max-width:240px; opacity:0.4;}

.level-now {font-size:20px; font-weight:600; margin-top:10px;}

.bottom {background:#fff; text-align:center; padding:30px 20px;}

.circle {
  width:180px; height:180px;
  border-radius:50%;
  background:#ffd166;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 16px;
  font-size:20px;
  font-weight:700;
}

.banner {
  background:#111;
  color:#fff;
  display:inline-block;
  padding:6px 20px;
  border-radius:20px;
  font-size:14px;
  margin-bottom:20px;
}

.progress-wrap {max-width:360px; margin:0 auto;}

.progress-text {
  display:flex;
  justify-content:space-between;
  font-size:13px;
  margin-bottom:6px;
  color:#555;
}

.progress-bar {
  height:14px;
  background:#eee;
  border-radius:10px;
  overflow:hidden;
}

.progress-fill {
  height:100%;
  background:linear-gradient(90deg,#ff6f61,#fcb045);
  width:0%;
}

.login {text-align:center; margin:20px;}

.login input {
  padding:8px;
  border:1px solid #ccc;
  border-radius:6px;
  width:220px;
}

.login button {
  padding:8px 14px;
  margin-left:6px;
  border:none;
  border-radius:6px;
  background:#1e2447;
  color:white;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="login">
  <input id="userIdInput" placeholder="Enter your User ID"/>
  <button onclick="loadData()">Check</button>
</div>

<div id="widget" style="display:none">

  <div class="top">
    <h1>Spring Contest</h1>
    <p>Ends 24 June 2026 (UK time)</p>
    <div class="divider"></div>
    <div class="level-now" id="currentLevel">YOU'RE ON LEVEL 1!</div>
  </div>

  <div class="bottom">
    <div class="circle" id="rewardCircle">💰 $0</div>
    <div class="banner" id="nextBanner">LEVEL 2</div>

    <div class="progress-wrap">
      <div class="progress-text">
        <span id="progressText">0 / 1000</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

  </div>
</div>

<script>

// 🔥 THAY LINK CỦA BẠN Ở ĐÂY
const apiUrl = "https://script.google.com/macros/s/AKfycbwQnBwgravJEERSGbZk1-YajdXWotR6xB58yV3UgEB6Bedeftp2WEeF39Q2uicsCfc/exec";

// milestones mới
const milestones = [
  {points:1000, reward:"$200"},
  {points:2000, reward:"$500"},
  {points:5000, reward:"$1,500"},
  {points:10000, reward:"$3,500"},
  {points:25000, reward:"$10,000"},
  {points:50000, reward:"$25,000"},
  {points:150000, reward:"$100,000"}
];

async function loadData() {
  const userId = document.getElementById("userIdInput").value.trim();

  if (!userId) {
    alert("Please enter User ID");
    return;
  }

  try {
    const res = await fetch(apiUrl + "?id=" + encodeURIComponent(userId));
    const data = await res.json();

    if (data.error) {
      alert(data.error);
      return;
    }

    render(data.points);

  } catch (err) {
    alert("API lỗi (check lại deploy Web App)");
    console.error(err);
  }
}

function render(points) {
  document.getElementById("widget").style.display = "block";

  let currentLevel = 0;
  let next = null;

  milestones.forEach((m, i) => {
    if (points >= m.points) {
      currentLevel = i + 1;
    } else if (!next) {
      next = m;
    }
  });

  if (!next) next = milestones[milestones.length - 1];

  document.getElementById("currentLevel").textContent =
    `YOU'RE ON LEVEL ${currentLevel}!`;

  document.getElementById("rewardCircle").textContent =
    "💰 " + next.reward;

  document.getElementById("nextBanner").textContent =
    `LEVEL ${currentLevel + 1}: ${next.points.toLocaleString()} POINTS`;

  const percent = Math.min(100, (points / next.points) * 100).toFixed(0);

  document.getElementById("progressText").textContent =
    `${points.toLocaleString()} / ${next.points.toLocaleString()}`;

  document.getElementById("progressPercent").textContent =
    percent + "%";

  document.getElementById("progressFill").style.width =
    percent + "%";
}

</script>

</body>
</html>
