<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Contest</title>

<style>
body {margin:0; font-family: Gotham, Arial, sans-serif; background:#fff;}

/* PAGE 1 - LOGIN */
.login {
  text-align:center;
  margin-top:120px;
}

.login input{
  padding:10px;
  border:1px solid #ccc;
  border-radius:6px;
  width:240px;
}

.login button{
  padding:10px 16px;
  margin-left:6px;
  border:none;
  border-radius:6px;
  background:#1e2447;
  color:white;
  cursor:pointer;
}

/* PAGE 2 - WIDGET */
.top {
  background:#1e2447;
  color:white;
  text-align:center;
  padding:30px 20px;
}

.top h1 {margin:0; font-size:26px;}
.top p {margin:4px 0; font-size:14px; opacity:0.9;}

.divider {
  border-top:1px solid #ccc;
  margin:16px auto;
  max-width:240px;
  opacity:0.4;
}

.level-now {
  font-size:20px;
  font-weight:600;
  margin-top:10px;
}

.bottom {
  background:#fff;
  text-align:center;
  padding:30px 20px;
}

.circle {
  width:180px;
  height:180px;
  border-radius:50%;
  background:#ffd166;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 16px;
  font-size:20px;
  font-weight:700;
}

.banner {
  background:#111;
  color:#fff;
  display:inline-block;
  padding:6px 20px;
  border-radius:20px;
  font-size:14px;
  margin-bottom:20px;
}

.progress-wrap {
  max-width:360px;
  margin:0 auto;
}

.progress-text {
  display:flex;
  justify-content:space-between;
  font-size:13px;
  margin-bottom:6px;
  color:#555;
}

.progress-bar {
  height:14px;
  background:#eee;
  border-radius:10px;
  overflow:hidden;
}

.progress-fill {
  height:100%;
  background:linear-gradient(90deg,#ff6f61,#fcb045);
  width:0%;
}

.email-display {
  margin-top:12px;
  font-size:13px;
  color:#666;
}
</style>
</head>

<body>

<!-- PAGE 1 -->
<div id="page1" class="login">
  <input type="text" id="userIdInput" placeholder="Enter your ID"/>
  <button onclick="loadData()">View</button>
</div>

<!-- PAGE 2 -->
<div id="page2" style="display:none">

  <div class="top">
    <h1>Christmas Contest</h1>
    <p>20 Sep to 31 Dec (23:59 GMT)</p>
    <div class="divider"></div>
    <div class="level-now" id="currentLevel"></div>
  </div>

  <div class="bottom">
    <div class="circle" id="rewardCircle"></div>
    <div class="banner" id="nextBanner"></div>

    <div class="progress-wrap">
      <div class="progress-text">
        <span id="progressText"></span>
        <span id="progressPercent"></span>
      </div>

      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <div class="email-display" id="emailDisplay"></div>
  </div>

</div>

<script>

async function loadData() {
  const userId = document.getElementById("userIdInput").value.trim();

  if (!userId) {
    alert("Please enter ID");
    return;
  }

  try {
    const res = await fetch(
      "https://script.google.com/macros/s/AKfycbwQnBwgravJEERSGbZk1-YajdXWotR6xB58yV3UgEB6Bedeftp2WEeF39Q2uicsCfc/exec?id="
      + encodeURIComponent(userId)
    );

    const data = await res.json();

    if (data.error) {
      alert(data.error);
      return;
    }

    // chuyển sang trang 2
    document.getElementById("page1").style.display = "none";
    document.getElementById("page2").style.display = "block";

    render(data);

  } catch (err) {
    alert("Error loading data");
    console.error(err);
  }
}

function render(data) {

  const points = data.points || 0;

  let milestones = [
    {points:250, reward:"$50"},
    {points:500, reward:"$100"},
    {points:1500, reward:"$500"},
    {points:2500, reward:"$750"},
    {points:5000, reward:"$2000"},
    {points:10000, reward:"$5000"},
    {points:25000, reward:"$12500"},
    {points:50000, reward:"$25000"},
    {points:100000, reward:"$75000"},
    {points:125000, reward:"$100000"}
  ];

  let currentLevel = 0;
  let next = milestones[0];

  for (let i = 0; i < milestones.length; i++) {
    if (points >= milestones[i].points) {
      currentLevel = i + 1;
    } else {
      next = milestones[i];
      break;
    }
  }

  document.getElementById("currentLevel").textContent =
    `YOU'RE ON LEVEL ${currentLevel}!`;

  document.getElementById("rewardCircle").textContent =
    "💰 " + next.reward;

  document.getElementById("nextBanner").textContent =
    `LEVEL ${currentLevel + 1}: ${next.points.toLocaleString()} POINTS`;

  const percent = Math.min(100, (points / next.points) * 100).toFixed(0);

  document.getElementById("progressText").textContent =
    `${points.toLocaleString()} / ${next.points.toLocaleString()}`;

  document.getElementById("progressPercent").textContent =
    percent + "%";

  document.getElementById("progressFill").style.width =
    percent + "%";

  document.getElementById("emailDisplay").textContent =
    "User ID: " + data.userId;
}

</script>

</body>
</html>
