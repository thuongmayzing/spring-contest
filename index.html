<script>
const apiUrl = "https://script.google.com/macros/s/AKfycbwQnBwgravJEERSGbZk1-YajdXWotR6xB58yV3UgEB6Bedeftp2WEeF39Q2uicsCfc/exec?id=";

document.getElementById("viewBtn").addEventListener("click", () => {
  const email = document.getElementById("emailInput").value.trim().toLowerCase();
  if (!email) { alert("Please enter email"); return; }
  loadData(email);
});

async function loadData(email) {
  try {
    const res = await fetch(apiUrl + encodeURIComponent(email));
    const data = await res.json();

    if (data.error) {
      alert(data.error);
      return;
    }

    const points = data.points || 0;
    render(points, email);

  } catch (err) {
    alert("Error loading data");
    console.error(err);
  }
}

// GIỮ NGUYÊN logic render của bạn
function render(points,email){
  document.getElementById("widget").style.display="block";
  document.getElementById("emailDisplay").textContent = "Email: "+email;

  let currentLevel=0, next=null;

  const milestones = [
    {points:250, reward:"$50"},
    {points:500, reward:"$100"},
    {points:1500, reward:"$500"},
    {points:2500, reward:"$750"},
    {points:5000, reward:"$2000"},
    {points:10000, reward:"$5000"},
    {points:25000, reward:"$12500"},
    {points:50000, reward:"$25000"},
    {points:100000, reward:"$75000"},
    {points:125000, reward:"$100000"}
  ];

  milestones.forEach((m,i)=>{
    if(points>=m.points){ currentLevel=i+1; }
    else if(!next){ next=m; }
  });

  if(!next) next = milestones[milestones.length - 1];

  document.getElementById("currentLevel").textContent =
    `YOU'RE ON LEVEL ${currentLevel}!`;

  document.getElementById("rewardCircle").textContent =
    "💰 " + next.reward;

  document.getElementById("nextBanner").textContent =
    `LEVEL ${currentLevel+1}: ${next.points.toLocaleString()} POINTS`;

  const percent = Math.min(100, (points/next.points)*100).toFixed(0);

  document.getElementById("progressText").textContent =
    `${points.toLocaleString()} / ${next.points.toLocaleString()}`;

  document.getElementById("progressPercent").textContent =
    percent + "%";

  document.getElementById("progressFill").style.width =
    percent + "%";
}
</script>
