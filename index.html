<script>
async function loadData() {
  const userId = document.getElementById("userIdInput").value.trim();

  if (!userId) {
    alert("Please enter User ID");
    return;
  }

  try {
    const res = await fetch(
      "https://script.google.com/macros/s/AKfycbxeJ2uEnKU2fZ10CKmCzvCsFdZCQYjkT4lizD7-1XXv-Vt189fDjOi47w3ucGwNQJY7pw/exec?id=" 
      + encodeURIComponent(userId)
    );

    const data = await res.json();

    if (data.error) {
      alert(data.error);
      return;
    }

    const box = document.getElementById("result");
    box.style.display = "block";

    box.innerHTML = `
      <p><b>User ID:</b> ${data.userId}</p>
      <p><b>Units:</b> ${data.units}</p>
      <p><b>Points:</b> ${data.points}</p>
      <p><b>Rank:</b> #${data.rank}</p>
    `;

  } catch (err) {
    alert("Error loading data");
    console.error(err);
  }
}
</script>
